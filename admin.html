<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel Professor</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="layout">

    <aside class="sidebar">
      <div class="logo">🎓</div>
      <nav>
        <a class="active">Home</a>
        <a>Professor</a>
      </nav>
    </aside>

    <main class="main">

        <!-- Substituir esse Olá catarina para pegar o nome com base no login colocar no local storage -->

          <h1>Olá, USER!</h1>
          <p>Veja o cadastro de alunos para validar se os documentos/dados estão corretos</p>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="header-img">
      </div>

      <div class="search-box">
        <input type="text" placeholder="Digite a matrícula do aluno" />
        <button>🔍</button>

      <div class="students">

        <div class="student-card">
          <div class="avatar green"></div>
          <div class="info">
            <h3>João Silva</h3>
            <!-- <span>Matrícula 024567</span> -->
          </div>
        </div>

        <div class="student-card">
          <div class="avatar pink"></div>
          <div class="info">
            <h3>Lucas Campos</h3>
            <!-- <span>Matrícula 984901</span> -->
          </div>
        </div>

        <div class="student-card">
          <div class="avatar brown"></div>
          <div class="info">
            <h3>Sara de Oliveira</h3>
            <!-- <span>Matrícula 762736</span> -->
          </div>
        </div>

        <div class="student-card">
          <div class="avatar yellow"></div>
          <div class="info">
            <h3>Ana Clara Gomes</h3>
            <!-- <span>Matrícula 872933</span> -->
          </div>
        </div>

      </div>

    </main>
  </div>

</body>
</html>
